version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./.env.example
    volumes:
      - ./data:/data
    depends_on:
      - redis
    ports:
      - "8000:8000"

  worker:
    build: ./backend
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    env_file:
      - ./.env.example
    volumes:
      - ./data:/data
    depends_on:
      - redis

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
